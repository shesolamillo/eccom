# config/packages/security.yaml
security:
    # Password hashing
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto

    # User provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        main:
            lazy: true
            provider: app_user_provider
            
            # CORRECTED Form login configuration
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler
                username_parameter: email
                password_parameter: password

            
            # Simple logout
            logout:
                path: app_logout
                target: app_home

    # Role hierarchy - Simple 3-tier system
    role_hierarchy:
        ROLE_ADMIN: ROLE_STAFF
        ROLE_STAFF: ROLE_USER

    # Access control - Simple rules
    access_control:
        # Public pages
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/home, roles: PUBLIC_ACCESS }
        - { path: ^/services, roles: PUBLIC_ACCESS }
        - { path: ^/contact, roles: PUBLIC_ACCESS }
        - { path: ^/about, roles: PUBLIC_ACCESS }
        
        # Auth pages
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        
        # Product catalog
        - { path: ^/products$, roles: PUBLIC_ACCESS }
        - { path: ^/product/, roles: PUBLIC_ACCESS }
        
        # User area
        - { path: ^/dashboard, roles: ROLE_USER }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/order/, roles: ROLE_USER }
        - { path: ^/my-orders, roles: ROLE_USER }
        
        # Staff area
        - { path: ^/staff, roles: ROLE_STAFF }
        - { path: ^/staff/, roles: ROLE_STAFF }
        
        # Admin area
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/admin/, roles: ROLE_ADMIN }